<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Cozy Outpost</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
canvas { image-rendering:pixelated; image-rendering:crisp-edges; }
html, body { width:100%; height:100%; overflow:hidden; background:#0d1620; font-family:'VT323',monospace; user-select:none; }
#root { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
#portrait-warn { display:none; }
@keyframes toastIn  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
@keyframes panelUp  { from{transform:translateY(44px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes bubbleFade { 0%{opacity:0} 8%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<div id="portrait-warn">
  <div style="font-size:32px">↻</div>
  <div>ROTATE YOUR PHONE</div>
  <div style="font-family:'VT323',monospace;font-size:14px;color:rgba(200,160,96,0.6);margin-top:8px">Ranger Outpost plays in landscape</div>
</div>
<div id="root"></div>
<script type="text/babel" src="HUD.jsx"></script>
<script type="text/babel" src="BottomNav.jsx"></script>
<script type="text/babel" src="Panels.jsx"></script>
<script type="text/babel" src="SpriteCanvas.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const BASE = 'https://flyingfishfox.github.io/cozy_outpost';

const ASSETS = {
  scene:   BASE+'/assets/this_more.png',
  outpost: BASE+'/assets/outpost.png',
  forest:  BASE+'/assets/edwdeeddd.png',
  cloud1:  BASE+'/assets/Cloud 1.png',  cloud2: BASE+'/assets/Cloud 2.png',
  cloud3:  BASE+'/assets/Cloud 3.png',  cloud4: BASE+'/assets/Cloud 4.png',
  cloud5:  BASE+'/assets/Cloud 5.png',  cloud6: BASE+'/assets/Cloud 6.png',
  idle:    BASE+'/assets/Idle.png',     walk:   BASE+'/assets/Walk.png',
  shoot:   BASE+'/assets/Shoot.png',    stab:   BASE+'/assets/Stab.png',
  bird:    BASE+'/assets/BirdFly.png',  dusk:   BASE+'/assets/Red Sky.png',
  pig:     BASE+'/assets/PigIdle.png',  cat:    BASE+'/assets/JumpCattt.png',
  scout:   BASE+'/background_extra/Dogs-Remastered-03.png',
  scout02: BASE+'/background_extra/Dogs-Remastered-02.png',
  zombie1: BASE+'/background_extra/Attack (1).png',
  zombie2: BASE+'/background_extra/Attack (2).png',
};

const OUTPOST_LINES = [
  "Again.","Right.","Yep.","As expected.",
  "Early start.","Same as yesterday.",
  "Still here. Good.","Fine.",
  "Worth getting up for.",
  "At least it's not raining.",
  "Fresh air. Good company. Sort of.",
  "Honest work.",
  "They never learn.","Here we go.",
  "Not a bad morning, all things considered.",
  "The things I do.",
  "Noted.","Outstanding.",
  "Just the usual.","Nobody panic.",
  "Quiet out here. Mostly.","This counts as cardio.",
  "Hm.","Another day.",
];
const OUTPOST_CLEAR_LINES = [
  "Nothing today. Good.","All clear. Appreciated.",
  "A quiet one.","Quiet. Good.",
  "Nobody showed up. I'll take it.",
  "A peaceful morning.",
  "Empty. Nice.","Not complaining.",
];

const WATCH_LINES = [
  "Still.","Wind's picked up a little.",
  "The grass moves like water.",
  "Something's circling up there. Hawk maybe.",
  "Everything's very far away. Good.",
  "Clear skies today.",
  "You could do this all day.",
  "Quiet.",
  "The mountain doesn't move. Neither do you.",
  "Miso the cat watches from the fence. Doesn't blink.",
  "Scout sits beside you. Good dog.",
  "The wind comes down from the peaks. Cold. Clean.",
  "Nothing to do. That's the point.",
];

const MORNING_LINES = [
  "Morning.","Another one.","Still here.",
  "Right then.","Let's go.","Good enough.",
  "Up and at it.","Fine day.",
];

const MILESTONE_LINES = {
  7:  "One week. Not bad.",
  14: "Two weeks out here. Starting to feel like mine.",
  30: "A month. Scout doesn't remember anything else.",
};

const SCOUT_RETURN_LINES = [
  "Scout runs up.","Scout's waiting by the door.",
  "Scout wags. Hard.","Good boy.",
];

const used={outpost:[],outpostClear:[],watch:[],morning:[],scoutReturn:[]};
function getLine(pool,arr){
  if(arr.length>=pool.length)arr.length=0;
  const rem=pool.filter((_,i)=>!arr.includes(i));
  const idx=pool.indexOf(rem[Math.floor(Math.random()*rem.length)]);
  arr.push(idx);return pool[idx];
}

// Shared button style for in-game floating buttons
const floatBtn = {
  background:'rgba(10,6,2,0.88)',
  border:'1px solid rgba(252,244,210,0.25)',
  color:'rgba(252,244,210,0.92)',
  fontFamily:'VT323', fontSize:18,
  padding:'7px 18px',
  cursor:'pointer', letterSpacing:'1px',
  display:'inline-flex', alignItems:'center', gap:8,
  transition:'background .08s',
};

function FloatBtn({ label, onClick, icon, disabled }){
  return (
    <button
      onPointerUp={disabled?undefined:onClick}
      onPointerDown={e=>!disabled&&(e.currentTarget.style.background='rgba(252,244,210,0.18)')}
      onPointerUp={e=>{e.currentTarget.style.background='rgba(10,6,2,0.88)';if(!disabled)onClick();}}
      style={{...floatBtn, opacity:disabled?0.35:1, cursor:disabled?'default':'pointer',
        minHeight:44, // minimum tap target
        touchAction:'manipulation',
      }}>
      {icon && <img src={icon} style={{imageRendering:'pixelated',height:13,display:'block'}}/>}
      {label}
    </button>
  );
}

function App() {
  const [screen,setScreen]         = useState('splash');
  const [playerName,setPlayerName] = useState('Ranger');
  const [scene, setScene]          = useState('home');
  const [day,   setDay]            = useState(1);
  const [morale,setMorale]         = useState(12);
  const [weather,setWeather]       = useState('clear'); // 'clear'|'rain'|'overcast'
  const [hitFlash,setHitFlash]     = useState(false);
  const [toasts,setToasts]         = useState([]);
  const [bubble,setBubble]         = useState(null);
  const [bubbleKey,setBubbleKey]   = useState(0);
  const [watching,setWatching]     = useState(false);
  const [watchText,setWatchText]   = useState('');
  const [zombiesLeft,setZombiesLeft]   = useState(0);
  const [canSleep,setCanSleep]     = useState(false);
  const [killZombie,setKillZombie] = useState(0);
  const [playerAction,setPlayerAction] = useState('idle');
  const [scoutCmd,setScoutCmd]     = useState('idle');
  const [scoutFetch,setScoutFetch] = useState(false);
  const [scoutMode,setScoutMode]   = useState(false);
  const [nearZombie,setNearZombie] = useState(false);
  const [logOpen,setLogOpen]       = useState(false);
  const [visitedOutpost,setVisitedOutpost] = useState(false);
  const [dayTransition,setDayTransition]   = useState(null);
  const [logEntries,setLogEntries] = useState([{day:1,text:'Arrived. Scout ran ahead.'}]);
  const [keys,setKeys]             = useState({left:false,right:false});
  const keysDownRef                = useRef({left:false,right:false});
  // Track which day we last showed an outpost quote — one per day only
  const outpostQuoteDayRef         = useRef(-1);
  const sceneRef                   = useRef('home');
  const watchAudioRef              = useRef(null);

  useEffect(()=>{ sceneRef.current=scene; },[scene]);

  const addToast=(msg)=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  };

  const showBubble=(text)=>{
    setBubble(text);setBubbleKey(k=>k+1);
    setTimeout(()=>setBubble(null),3600);
  };

  const handleSceneChange=useCallback((newScene)=>{
    setScene(newScene);
    setWatching(false);
    setPlayerAction('idle');setScoutMode(false);setScoutFetch(false);
    setKillZombie(0);
    if(watchAudioRef.current){watchAudioRef.current.pause();watchAudioRef.current.currentTime=0;}
    if(newScene==='outpost'){
      setVisitedOutpost(true);
      setZombiesLeft(zl=>{
        setDay(d=>{
          if(outpostQuoteDayRef.current!==d){
            outpostQuoteDayRef.current=d;
            setTimeout(()=>{
              if(zl===0)showBubble(getLine(OUTPOST_CLEAR_LINES,used.outpostClear));
              else showBubble(getLine(OUTPOST_LINES,used.outpost));
            },400);
          }
          return d;
        });
        if(zl===0)setCanSleep(true);
        return zl;
      });
    }
  },[]);

  const startWatching=()=>{
    setWatching(true);setWatchText(getLine(WATCH_LINES,used.watch));
    if(!watchAudioRef.current){
      watchAudioRef.current=new Audio(BASE+'/Udio - Rare Dream.ogg');
      watchAudioRef.current.loop=true;watchAudioRef.current.volume=0.6;
    }
    watchAudioRef.current.currentTime=0;
    watchAudioRef.current.play().catch(()=>{});
  };
  const stopWatching=()=>{
    setWatching(false);
    if(watchAudioRef.current){watchAudioRef.current.pause();watchAudioRef.current.currentTime=0;}
  };

  const onZombieKilled=useCallback(()=>{
    setZombiesLeft(rem=>{
      const next=rem-1;
      if(next<=0){
        setCanSleep(true); // safe — player is at outpost killing zombies
        setMorale(m=>m+3);
        addToast('All clear.');
        setLogEntries(e=>[...e,{day,text:'Cleared the outpost.'}]);
      }
      return next;
    });
  },[day]);

  const doAttack=(type)=>{
    if(zombiesLeft<=0||!nearZombie)return;
    setPlayerAction(type);
    if(type==='shoot'){ // flash only on shoot
      setHitFlash(true);
      setTimeout(()=>setHitFlash(false),120);
    }
    setTimeout(()=>setPlayerAction('idle'),type==='stab'?600:700);
    setKillZombie(k=>k+1);
  };

  const doSleep=()=>{
    const nextDay=day+1;
    const zc=Math.random()<0.2?0:3+Math.floor(Math.random()*3);
    const w=Math.random();
    const wx=w<0.3?'rain':w<0.5?'overcast':'clear';
    const wxText=wx==='rain'?'Rain overnight.':wx==='overcast'?'Overcast.':'Clear skies.';
    // Richer log entries
    const scoutBits=['Scout slept at the foot of the bed.','Scout found a stick. Kept it.','Scout was restless. Settled eventually.'];
    const scoutBit=scoutBits[Math.floor(Math.random()*scoutBits.length)];
    setDayTransition({day:nextDay,weather:wxText,zombies:zc});
    setTimeout(()=>{
      setDayTransition(null);
      setDay(nextDay);
      setZombiesLeft(zc);
      setWeather(wx);
      setCanSleep(false);
      setVisitedOutpost(false);
      setScoutCmd('idle');
      setScene('home');
      setMorale(m=>Math.min(m+4,30));
      // Morning greeting bubble
      const milestone=MILESTONE_LINES[nextDay];
      setTimeout(()=>{
        if(milestone) showBubble(milestone);
        else showBubble(getLine(MORNING_LINES,used.morning));
      },600);
      const logText=`${wxText} ${scoutBit} ${zc===0?'Nothing at the outpost.':`${zc} spotted at the outpost.`}`;
      setLogEntries(e=>[...e,{day:nextDay,text:logText}]);
    },2200);
  };

  const cmdScout=(cmd)=>{
    setScoutCmd(cmd);setScoutFetch(false);
    if(cmd==='beg')   addToast('You gave Scout a treat.');
    if(cmd==='sit')   addToast('Good boy.');
    if(cmd==='sleep') addToast('Scout curls up. See you tomorrow.');
    if(cmd==='run'){
      setScoutFetch(true);addToast('Scout fetches!');
      setTimeout(()=>{setScoutFetch(false);setScoutCmd('idle');},8000);return;
    }
    if(cmd==='sit'||cmd==='beg')setTimeout(()=>setScoutCmd('idle'),3000);
  };

  useEffect(()=>{
    const zc=Math.random()<0.2?0:3+Math.floor(Math.random()*3);
    setZombiesLeft(zc);
  },[]);

  if(screen==='splash')return <SplashScreen onStart={(name)=>{setPlayerName(name||'Ranger');setScreen('game');}}/>;

  // Day transition overlay
  if(dayTransition) return (
    <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#080604',flexDirection:'column',gap:20,animation:'fadeIn .4s ease-out'}}>
      <style>{`@keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
      <div style={{fontFamily:'Press Start 2P',fontSize:10,color:'rgba(252,244,210,0.3)',letterSpacing:'3px'}}>NIGHT FALLS</div>
      <div style={{fontFamily:'Press Start 2P',fontSize:22,color:'rgba(252,244,210,0.9)',letterSpacing:'4px'}}>DAY {dayTransition.day}</div>
      <div style={{fontFamily:'VT323',fontSize:20,color:'rgba(252,244,210,0.5)',marginTop:8}}>{dayTransition.weather}</div>
    </div>
  );

  return (
    <GameScreen
      assets={ASSETS} scene={scene} onSceneChange={handleSceneChange}
      day={day} morale={morale} toasts={toasts}
      bubble={bubble} bubbleKey={bubbleKey}
      watching={watching} watchText={watchText}
      startWatching={startWatching} stopWatching={stopWatching}
      zombiesLeft={zombiesLeft} canSleep={canSleep}
      playerAction={playerAction} scoutCmd={scoutCmd} scoutFetch={scoutFetch}
      scoutMode={scoutMode} setScoutMode={setScoutMode}
      nearZombie={nearZombie} setNearZombie={setNearZombie}
      cmdScout={cmdScout}
      doStab={()=>doAttack('stab')} doShoot={()=>doAttack('shoot')} doSleep={doSleep}
      killZombie={killZombie} onZombieKilled={onZombieKilled}
      logOpen={logOpen} setLogOpen={setLogOpen} logEntries={logEntries}
      keys={keys} setKeys={setKeys} day={day}
      keysDownRef={keysDownRef}
      weather={weather} hitFlash={hitFlash} playerName={playerName}
    />
  );
}

function SplashScreen({ onStart }) {
  const [name,setName]=React.useState('');
  return (
    <div style={{position:'relative',width:'100%',height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:24,margin:'0 auto',boxShadow:'0 0 60px rgba(0,0,0,0.9)',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,backgroundImage:`url('${BASE}/assets/background_glacial_mountains.png')`,backgroundSize:'cover',backgroundPosition:'center',imageRendering:'pixelated'}}/>
      <div style={{position:'absolute',inset:0,background:'rgba(8,14,24,0.55)'}}/>
      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
        <div style={{fontFamily:'Press Start 2P',fontSize:16,color:'#f0cc28',lineHeight:1.8,textShadow:'3px 3px 0 #000',letterSpacing:2}}>
          COZY<br/>OUTPOST
        </div>
        <div style={{fontFamily:'VT323',fontSize:20,color:'#c8d8f0',textShadow:'1px 1px 0 #000',letterSpacing:1}}>
          Somewhere out there
        </div>
        <input value={name} onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&onStart(name)}
          placeholder="Your hiker name..."
          maxLength={14}
          style={{background:'rgba(252,244,210,0.95)',color:'#281806',border:'3px solid #b88820',padding:'8px 14px',fontFamily:'VT323',fontSize:22,width:220,textAlign:'center',outline:'none'}}
        />
        <button onClick={()=>onStart(name)}
          onMouseDown={e=>e.currentTarget.style.background='rgba(252,244,210,0.2)'}
          onMouseUp={e=>e.currentTarget.style.background='rgba(252,244,210,0.08)'}
          style={{background:'rgba(252,244,210,0.08)',border:'2px solid rgba(252,244,210,0.35)',color:'rgba(252,244,210,0.95)',fontFamily:'Press Start 2P',fontSize:10,padding:'12px 28px',cursor:'pointer',letterSpacing:2,transition:'background .08s'}}>
          BEGIN
        </button>
        <div style={{fontFamily:'VT323',fontSize:15,color:'rgba(180,210,240,0.5)'}}>
          walk left and right to explore
        </div>
      </div>
    </div>
  );
}

function GameScreen(props){
  const {
    assets,scene,onSceneChange,day,morale,toasts,
    bubble,bubbleKey,watching,watchText,startWatching,stopWatching,
    zombiesLeft,canSleep,playerAction,scoutCmd,scoutFetch,
    scoutMode,setScoutMode,nearZombie,setNearZombie,
    cmdScout,doStab,doShoot,doSleep,
    killZombie,onZombieKilled,
    logOpen,setLogOpen,logEntries,keys,setKeys,
    weather,hitFlash,playerName,keysDownRef,
  }=props;

  // Weather tint overlay colors
  const weatherTint = weather==='rain' ? 'rgba(40,60,100,0.18)' : weather==='overcast' ? 'rgba(60,60,80,0.12)' : null;

  return (
    <div style={{position:'relative',width:'100%',height:'100%',margin:'0 auto',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 0 60px rgba(0,0,0,0.9)'}}>
      <div style={{flex:1,position:'relative',overflow:'hidden',minHeight:0}}>
        <SceneLayer assets={assets} scene={scene} onSceneChange={onSceneChange}
          playerAction={playerAction} scoutCmd={scoutCmd} scoutFetch={scoutFetch}
          setNearScout={()=>{}} setNearZombie={setNearZombie}
          zombiesLeft={zombiesLeft} watching={watching} keysDown={keys}
          killZombie={killZombie} onZombieKilled={onZombieKilled} day={day}
          weather={weather} keysDownRef={keysDownRef}/>

        {/* Weather tint */}
        {weatherTint && <div style={{position:'absolute',inset:0,background:weatherTint,pointerEvents:'none',zIndex:10}}/>}

        {/* Hit flash */}
        {hitFlash && <div style={{position:'absolute',inset:0,background:'rgba(255,255,255,0.18)',pointerEvents:'none',zIndex:11}}/>}

        <HUDBar day={day} morale={morale} onLogOpen={()=>setLogOpen(true)}/>

        {/* Toasts */}
        <div style={{position:'absolute',top:38,left:'50%',transform:'translateX(-50%)',zIndex:200,pointerEvents:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
          {toasts.map(t=>(
            <div key={t.id} style={{background:'rgba(10,6,2,0.88)',border:'1px solid rgba(252,244,210,0.15)',padding:'4px 12px',fontFamily:'VT323',fontSize:16,color:'rgba(252,244,210,0.9)',whiteSpace:'nowrap',animation:'toastIn .18s ease-out'}}>
              {t.msg}
            </div>
          ))}
        </div>

        {/* Speech bubble */}
        {bubble && (
          <div key={bubbleKey} style={{position:'absolute',bottom:'44%',left:'50%',background:'rgba(252,244,210,0.96)',border:'2px solid #886030',borderRadius:4,padding:'6px 14px',fontFamily:'VT323',fontSize:17,color:'#381e08',zIndex:90,maxWidth:'75%',textAlign:'center',lineHeight:1.4,animation:'bubbleFade 3.6s ease-out forwards',transform:'translateX(-50%)',pointerEvents:'none'}}>
            {bubble}
          </div>
        )}

        {/* Watch text */}
        {watching && watchText && (
          <div key={watchText} style={{position:'absolute',bottom:'18%',left:'50%',transform:'translateX(-50%)',background:'rgba(252,244,210,0.96)',border:'2px solid #886030',borderRadius:4,padding:'6px 14px',fontFamily:'VT323',fontSize:16,color:'#381e08',zIndex:90,width:'auto',maxWidth:'55%',textAlign:'center',lineHeight:1.4,animation:'bubbleFade 3.6s ease-out forwards',pointerEvents:'none'}}>
            {watchText}
          </div>
        )}

        {/* Forest */}
        {scene==='forest' && !watching && (
          <div style={{position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)',zIndex:100}}>
            <FloatBtn label="WATCH THE VIEW" onClick={startWatching}/>
          </div>
        )}
        {scene==='forest' && watching && (
          <div style={{position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)',zIndex:100}}>
            <FloatBtn label="STOP WATCHING" onClick={stopWatching}/>
          </div>
        )}

        {/* Outpost */}
        {scene==='outpost' && zombiesLeft>0 && (
          <div style={{position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)',zIndex:100,display:'flex',gap:10}}>
            <FloatBtn label="STAB"  onClick={doStab}  icon={BASE+'/ui_kits/Sword8.png'}  disabled={!nearZombie}/>
            <FloatBtn label="SHOOT" onClick={doShoot} icon={BASE+'/ui_kits/Deagle.png'}  disabled={!nearZombie}/>
          </div>
        )}
        {scene==='outpost' && zombiesLeft>0 && (
          <div style={{position:'absolute',top:38,right:8,zIndex:60,background:'rgba(10,6,2,0.88)',border:'1px solid rgba(252,244,210,0.12)',padding:'3px 8px',fontFamily:'Press Start 2P',fontSize:7,color:'#c06060'}}>
            x{zombiesLeft}
          </div>
        )}

        {/* Sleep */}
        {scene==='home' && canSleep && (
          <div style={{position:'absolute',bottom:14,left:'50%',transform:'translateX(-50%)',zIndex:100}}>
            <FloatBtn label="SLEEP" onClick={doSleep}/>
          </div>
        )}

        {/* Log */}
        {logOpen && (
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',backdropFilter:'blur(3px)',zIndex:100,display:'flex',alignItems:'flex-end'}}
            onClick={e=>{if(e.target===e.currentTarget)setLogOpen(false)}}>
            <LogPanel entries={logEntries} onClose={()=>setLogOpen(false)} playerName={playerName}/>
          </div>
        )}
      </div>

      <BottomNav
        onLeft={()=>{setKeys(k=>({...k,left:true}));keysDownRef.current.left=true;}}
        onLeftUp={()=>{setKeys(k=>({...k,left:false}));keysDownRef.current.left=false;}}
        onRight={()=>{setKeys(k=>({...k,right:true}));keysDownRef.current.right=true;}}
        onRightUp={()=>{setKeys(k=>({...k,right:false}));keysDownRef.current.right=false;}}
        scene={scene} scoutMode={scoutMode}
        setScoutMode={setScoutMode} cmdScout={cmdScout}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
